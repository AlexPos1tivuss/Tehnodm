openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Repair Story Pro API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: bookings
    description: Booking management
  - name: calendar
    description: Calendar slots
  - name: export
    description: Export operations
  - name: users
    description: User management
  - name: time-tracking
    description: Work time tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings (admin/technician)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, accepted, diagnosing, repairing, ready, closed]
        - name: technicianId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/my:
    get:
      operationId: listMyBookings
      tags: [bookings]
      summary: List my bookings (client)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of my bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/track/{code}:
    get:
      operationId: trackBooking
      tags: [bookings]
      summary: Public tracker - get booking by code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking with logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingWithLogsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking with logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingWithLogsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (admin/technician)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingWithLogsResponse"
        "400":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/assign:
    patch:
      operationId: assignTechnician
      tags: [bookings]
      summary: Assign technician to booking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTechBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calendar/slots:
    get:
      operationId: getCalendarSlots
      tags: [calendar]
      summary: Get available time slots for a date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarSlot"
        "400":
          description: Invalid date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/{id}/pdf:
    get:
      operationId: exportPdf
      tags: [export]
      summary: Export booking as PDF
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/csv:
    get:
      operationId: exportCsv
      tags: [export]
      summary: Export all bookings as CSV (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/technicians:
    get:
      operationId: listTechnicians
      tags: [users]
      summary: List technicians (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of technicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /time-tracking/clock-in:
    post:
      operationId: clockIn
      tags: [time-tracking]
      summary: Start a work shift
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Shift started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSessionResponse"
        "400":
          description: Already clocked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /time-tracking/clock-out:
    post:
      operationId: clockOut
      tags: [time-tracking]
      summary: End current work shift
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Shift ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSessionResponse"
        "400":
          description: Not clocked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /time-tracking/my-status:
    get:
      operationId: getMyShiftStatus
      tags: [time-tracking]
      summary: Get current shift status for authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current shift status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftStatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /time-tracking/sessions:
    get:
      operationId: listWorkSessions
      tags: [time-tracking]
      summary: List work sessions (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of work sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkSessionWithUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createWorkSession
      tags: [time-tracking]
      summary: Create a work session manually (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSessionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /time-tracking/sessions/{id}:
    patch:
      operationId: updateWorkSession
      tags: [time-tracking]
      summary: Update a work session (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkSessionBody"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSessionResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteWorkSession
      tags: [time-tracking]
      summary: Delete a work session (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /time-tracking/summary:
    get:
      operationId: getTimeSummary
      tags: [time-tracking]
      summary: Get work time summary per employee (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Summary per employee
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSummaryItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
      required:
        - email
        - password
        - name

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
      required:
        - accessToken
        - user

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [client, technician, admin]
      required:
        - id
        - email
        - name
        - role

    CreateBookingBody:
      type: object
      properties:
        device:
          type: string
        issue:
          type: string
        appointmentAt:
          type: string
          format: date-time
          nullable: true
      required:
        - device
        - issue

    BookingResponse:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        device:
          type: string
        issue:
          type: string
        status:
          type: string
          enum: [new, accepted, diagnosing, repairing, ready, closed]
        appointmentAt:
          type: string
          format: date-time
          nullable: true
        clientId:
          type: integer
        technicianId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - code
        - device
        - issue
        - status
        - clientId
        - createdAt
        - updatedAt

    RepairLogResponse:
      type: object
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        fromStatus:
          type: string
        toStatus:
          type: string
        note:
          type: string
          nullable: true
        byUserId:
          type: integer
        byUserName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookingId
        - fromStatus
        - toStatus
        - byUserId
        - byUserName
        - createdAt

    BookingWithLogsResponse:
      type: object
      properties:
        booking:
          $ref: "#/components/schemas/BookingResponse"
        logs:
          type: array
          items:
            $ref: "#/components/schemas/RepairLogResponse"
      required:
        - booking
        - logs

    UpdateStatusBody:
      type: object
      properties:
        to:
          type: string
          enum: [accepted, diagnosing, repairing, ready, closed]
        note:
          type: string
      required:
        - to

    AssignTechBody:
      type: object
      properties:
        technicianId:
          type: integer
      required:
        - technicianId

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
      required:
        - accessToken

    CalendarSlot:
      type: object
      properties:
        time:
          type: string
        available:
          type: boolean
      required:
        - time
        - available

    WorkSessionResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - clockIn
        - createdAt

    WorkSessionWithUser:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - userName
        - clockIn
        - createdAt

    ShiftStatusResponse:
      type: object
      properties:
        onShift:
          type: boolean
        session:
          $ref: "#/components/schemas/WorkSessionResponse"
          nullable: true
      required:
        - onShift

    CreateWorkSessionBody:
      type: object
      properties:
        userId:
          type: integer
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
      required:
        - userId
        - clockIn

    UpdateWorkSessionBody:
      type: object
      properties:
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true
        note:
          type: string

    TimeSummaryItem:
      type: object
      properties:
        userId:
          type: integer
        userName:
          type: string
        totalHours:
          type: number
          format: float
        sessionCount:
          type: integer
      required:
        - userId
        - userName
        - totalHours
        - sessionCount
