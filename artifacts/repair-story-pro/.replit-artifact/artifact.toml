kind = "web"
previewPath = "/"
title = "Repair Story Pro"
version = "1.0.0"
id = "artifacts/repair-story-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21383
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/repair-story-pro run dev"

[services.env]
PORT = "21383"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/repair-story-pro", "run", "build"]
publicDir = "artifacts/repair-story-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
