    description: "Abstract premium technology background with soft glowing blue and teal gradients, glassmorphism elements, clean minimal"
    aspect_ratio: "16:9"
  - path: "artifacts/repair-story-pro/public/images/auth-bg.png"
    description: "Elegant abstract dark blue geometric shapes overlapping with soft lighting, subtle depth"
